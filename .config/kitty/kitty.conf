# Download themes from https://github.com/kovidgoyal/kitty-themes
include ./theme.conf

close_window_with_confirmation ignore-shell
confirm_os_window_close -1
copy_on_select yes
cursor_blink_interval .5
cursor_shape block
enable_audio_bell no
modify_font cell_height 110%
paste_actions quote-urls-at-prompt,confirm,confirm-if-large
remember_window_size yes
scrollback_lines 2000
scrollback_pager less --chop-long-lines --RAW-CONTROL-CHARS +INPUT_LINE_NUMBER
scrollback_pager_history_size 0
select_by_word_characters @-/._~?&=%+#
shell_integration no-cursor
strip_trailing_spaces smart
tab_bar_edge bottom
tab_bar_margin_width 0.0
tab_bar_min_tabs 1
tab_switch_strategy previous
tab_title_template {title}
term xterm-256color
update_check_interval 0
window_margin_width 0 0 0 20
window_padding_width 2.0
window_resize_step_cells 2
window_resize_step_lines 2

kitty_mod               ctrl+shift
clear_all_shortcuts     no

map alt+t               new_tab
map alt+w               close_tab
map kitty_mod+w         close_window

map alt+pagedown        next_tab
map alt+pageup          previous_tab

# paste_from_selection unneeded in windows/wslg
map alt+v               paste_from_clipboard
map shift+insert        paste_from_clipboard
map kitty_mod+v         paste_from_clipboard
mouse_map middle release ungrabbed paste_from_clipboard

map alt+1               goto_tab 1
map alt+2               goto_tab 2
map alt+3               goto_tab 3
map alt+4               goto_tab 4
map alt+5               goto_tab 5
map alt+6               goto_tab 6
map alt+7               goto_tab 7
map alt+8               goto_tab 8
map alt+9               goto_tab 9

# Seti-UI + Custom
symbol_map U+e5fa-U+e6ac Symbols Nerd Font
# Devicons
symbol_map U+e700-U+e7c5 Symbols Nerd Font
# Font Awesome
symbol_map U+f000-U+f2e0 Symbols Nerd Font
# Font Awesome Extension
symbol_map U+e200-U+e2a9 Symbols Nerd Font
# Material Design Icons
symbol_map U+f0001-U+f1af0 Symbols Nerd Font
# Weather
symbol_map U+e300-U+e3e3 Symbols Nerd Font
# Octicons
symbol_map U+f400-U+f532,U+2665,U+26a1 Symbols Nerd Font
# Powerline Symbols
symbol_map U+e0a0-U+e0a2,U+e0b0-U+e0b3 Symbols Nerd Font
# Powerline Extra Symbols
symbol_map U+e0a3,U+e0b4-U+e0c8,U+e0ca,U+e0cc-U+e0d4 Symbols Nerd Font
# IEC Power Symbols
symbol_map U+23fb-U+23fe,U+2b58 Symbols Nerd Font
# Font Logos
symbol_map U+f300-U+f32f Symbols Nerd Font
# Pomicons
symbol_map U+e000-U+e00a Symbols Nerd Font
# Codicons
symbol_map U+ea60-U+ebeb Symbols Nerd Font
# Heavy Angle Brackets
symbol_map U+276c-U+2771 Symbols Nerd Font
# Box Drawing
symbol_map U+2500-U+259f Symbols Nerd Font
# Misc Code Point Fixes - copied from web
symbol_map U+21b5,U+25b8,U+2605,U+2630,U+2632,U+2714,U+e0a3,U+e615,U+e62b Symbols Nerd Font

font_size 14
# BEGIN_KITTY_FONTS
font_family      family='Cascadia Mono' variable_name=CascadiaMonoRoman style=SemiLight features='+calt +ss01'
bold_font        family='Cascadia Mono' variable_name='' style=Italic features='+calt +ss01'
italic_font      family='Cascadia Mono' variable_name='' style=Italic features='+calt +ss01'
bold_italic_font family='Cascadia Mono' variable_name='' style=Italic features='+calt +ss01'

