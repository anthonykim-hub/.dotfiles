# ~/.config/starship.toml
# "$schema" = 'https://starship.rs/config-schema.json'
continuation_prompt = "[.](bright-black) "
command_timeout = 1000

[hostname]
ssh_only = false
disabled = false
# ssh_symbol = "ssh "
###customize hostname at prompt here:
# format = "hostname: "

[line_break]
disabled = false

[character]
disabled = false
success_symbol = '''[
\$](bold green)'''
error_symbol = '''[
\$](bold red)'''

[nodejs]
disabled = true
symbol = "nodejs "

